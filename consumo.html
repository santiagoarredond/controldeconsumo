<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Consumo</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:          #f4f0fb;
            --header-bg:   #fce4f3;
            --accent:      #f472b6;
            --accent2:     #c084fc;
            --lavender:    #e9d5ff;
            --card:        #ffffff;
            --card2:       #fdf4ff;
            --border:      #ede9f6;
            --text:        #3b1f5e;
            --muted:       #9d8bb0;
            --soft:        #c4aee0;
            --radius:      22px;
            --shadow:      0 4px 24px rgba(180,130,220,0.13);
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── DIAGONAL HEADER (inspired by Nequi shape) ── */
        header {
            position: relative;
            background: linear-gradient(135deg, #fce4f3 60%, #e9d5ff 100%);
            padding: 28px 28px 70px;
            overflow: visible;
            z-index: 20;
        }

        /* Diagonal bottom cut like Nequi */
        header::after {
            content: '';
            position: absolute;
            bottom: -32px;
            left: 0;
            right: 0;
            height: 64px;
            background: var(--bg);
            clip-path: polygon(0 50%, 100% 0, 100% 100%, 0 100%);
            z-index: 1;
        }

        /* Decorative blob */
        header::before {
            content: '';
            position: absolute;
            bottom: -10px;
            right: 0;
            width: 160px;
            height: 120px;
            background: linear-gradient(135deg, #f9a8d4 0%, #c084fc 100%);
            clip-path: polygon(100% 0, 100% 100%, 0 100%);
            z-index: 0;
            opacity: 0.55;
        }

        .header-inner {
            position: relative;
            z-index: 10;
            max-width: 960px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .greeting {
            font-size: 0.72rem;
            font-weight: 400;
            color: var(--muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .app-title {
            font-family: 'Fraunces', serif;
            font-weight: 600;
            font-size: 1.6rem;
            color: var(--text);
            line-height: 1.1;
            margin-top: 2px;
        }

        .app-title em {
            font-style: italic;
            font-weight: 300;
            color: #be4aaf;
        }

        .header-badge {
            background: rgba(255,255,255,0.7);
            border: 1px solid #f9a8d4;
            border-radius: 100px;
            padding: 6px 14px;
            font-size: 0.65rem;
            font-weight: 700;
            color: #be4aaf;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            backdrop-filter: blur(4px);
            cursor: pointer;
            transition: background 0.2s;
        }
        .header-badge:hover { background: rgba(255,255,255,0.95); }

        /* ── DATE STRIP ── */
        .date-strip {
            max-width: 960px;
            margin: 0 auto;
            padding: 52px 24px 0;
            font-size: 0.62rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--soft);
        }

        /* ── MAIN ── */
        main {
            max-width: 960px;
            width: 100%;
            margin: 0 auto;
            padding: 20px 24px 60px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 28px;
            position: relative;
            z-index: 10;
        }

        /* ── CARDS GRID ── */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 14px;
        }

        .card {
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 22px 22px 18px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            box-shadow: var(--shadow);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(180,130,220,0.2); }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .card-label {
            font-size: 0.6rem;
            font-weight: 800;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--soft);
        }

        .card-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-top: 2px;
        }

        .card-count {
            font-family: 'Fraunces', serif;
            font-size: 3rem;
            font-weight: 600;
            line-height: 1;
            color: var(--text);
        }

        .card-unit {
            display: block;
            font-family: 'Nunito', sans-serif;
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: 0.08em;
            margin-top: 4px;
        }

        .card-buttons { display: flex; gap: 8px; }

        .btn-pill {
            flex: 1;
            border: none;
            font-family: 'Nunito', sans-serif;
            font-size: 0.72rem;
            font-weight: 800;
            letter-spacing: 0.04em;
            padding: 12px 8px;
            border-radius: 14px;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
        }
        .btn-pill:active { transform: scale(0.96); }

        .btn-pink {
            background: linear-gradient(135deg, #f9a8d4, #f472b6);
            color: #fff;
            box-shadow: 0 4px 14px rgba(244,114,182,0.35);
        }
        .btn-pink:hover { opacity: 0.9; box-shadow: 0 6px 20px rgba(244,114,182,0.45); }

        .btn-violet {
            background: linear-gradient(135deg, #d8b4fe, #a855f7);
            color: #fff;
            box-shadow: 0 4px 14px rgba(168,85,247,0.3);
        }
        .btn-violet:hover { opacity: 0.9; }

        .btn-lavender {
            background: linear-gradient(135deg, #e9d5ff, #c084fc);
            color: #5b21b6;
            box-shadow: 0 4px 14px rgba(192,132,252,0.25);
        }
        .btn-lavender:hover { opacity: 0.9; }

        /* ── PULSE ── */
        @keyframes pulse-soft {
            0%   { box-shadow: 0 4px 24px rgba(180,130,220,0.13); }
            40%  { box-shadow: 0 0 0 16px rgba(244,114,182,0.15); }
            100% { box-shadow: 0 4px 24px rgba(180,130,220,0.13); }
        }
        .pulse { animation: pulse-soft 0.55s ease-out; }

        /* ── CHART SECTION ── */
        .chart-section {
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 24px 24px 20px;
            box-shadow: var(--shadow);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .chart-title {
            font-size: 0.6rem;
            font-weight: 800;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--soft);
        }

        .btn-danger {
            background: #fff0f5;
            border: 1px solid #fecdd3;
            color: #e11d48;
            font-family: 'Nunito', sans-serif;
            font-size: 0.65rem;
            font-weight: 700;
            cursor: pointer;
            padding: 5px 12px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .btn-danger:hover { background: #ffe4e6; }

        .chart-wrap { height: 260px; position: relative; }

        /* ── FOOTER ── */
        footer {
            text-align: center;
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--soft);
            padding: 18px;
            border-top: 1.5px solid var(--border);
            background: var(--card);
        }

        /* ── EXPORT ROW ── */
        .export-row {
            display: flex;
            justify-content: flex-end;
        }

        /* ── TOAST ── */
        #toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: linear-gradient(135deg, #f9a8d4, #a855f7);
            color: #fff;
            font-family: 'Nunito', sans-serif;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            padding: 11px 26px;
            border-radius: 100px;
            box-shadow: 0 8px 28px rgba(168,85,247,0.35);
            z-index: 999;
            transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.35s;
            opacity: 0;
            pointer-events: none;
            white-space: nowrap;
        }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* ── RESPONSIVE ── */
        @media (max-width: 540px) {
            header { padding: 22px 20px 64px; }
            main { padding: 16px 14px 48px; }
            .card-count { font-size: 2.4rem; }
            .date-strip { padding-top: 44px; padding-left: 14px; }
        }
    </style>
</head>
<body>

<!-- ══ HEADER (Nequi-style diagonal) ══ -->
<header>
    <div class="header-inner">
        <div>
            <div class="greeting">Tu herramienta personal</div>
            <div class="app-title">Registro de <em>consumo</em></div>
        </div>
        <button class="header-badge" onclick="exportarDatos()">Exportar</button>
    </div>
</header>

<div class="date-strip" id="dateStrip"></div>

<main>

    <!-- ══ CARDS ══ -->
    <div class="cards-grid">

        <!-- Marihuana -->
        <div class="card" id="card-marihuana">
            <div class="card-top">
                <div class="card-label">Marihuana</div>
                <div class="card-dot" style="background:#f9a8d4"></div>
            </div>
            <div>
                <div class="card-count" id="count-marihuana">0</div>
                <span class="card-unit">caladas hoy</span>
            </div>
            <div class="card-buttons">
                <button class="btn-pill btn-pink" onclick="registrar('marihuana',1,'card-marihuana')">+ 1 calada</button>
            </div>
        </div>

        <!-- Cocaína -->
        <div class="card" id="card-cocaina">
            <div class="card-top">
                <div class="card-label">Cocaína</div>
                <div class="card-dot" style="background:#c084fc"></div>
            </div>
            <div>
                <div class="card-count" id="count-cocaina">0</div>
                <span class="card-unit">dosis hoy</span>
            </div>
            <div class="card-buttons">
                <button class="btn-pill btn-violet" onclick="registrar('cocaina',1,'card-cocaina')">Fosa Izq.</button>
                <button class="btn-pill btn-violet" onclick="registrar('cocaina',1,'card-cocaina')">Fosa Der.</button>
            </div>
        </div>

        <!-- Cigarrillo -->
        <div class="card" id="card-cigarrillo">
            <div class="card-top">
                <div class="card-label">Cigarrillo</div>
                <div class="card-dot" style="background:#d8b4fe"></div>
            </div>
            <div>
                <div class="card-count" id="count-cigarrillo">0</div>
                <span class="card-unit">unidades hoy</span>
            </div>
            <div class="card-buttons">
                <button class="btn-pill btn-lavender" onclick="registrar('cigarrillo',1,'card-cigarrillo')">+ 1 unidad</button>
            </div>
        </div>

    </div>

    <!-- ══ CHART ══ -->
    <div class="chart-section">
        <div class="chart-header">
            <span class="chart-title">Últimos 7 días</span>
            <button class="btn-danger" onclick="resetearDatos()">Limpiar historial</button>
        </div>
        <div class="chart-wrap">
            <canvas id="consumptionChart"></canvas>
        </div>
    </div>

</main>

<footer>Datos guardados localmente · ningún dato sale de este dispositivo</footer>

<div id="toast"></div>

<!-- ══════════════════════════════════════════
     LÓGICA — edita SUSTANCIAS para personalizar
══════════════════════════════════════════════ -->
<script>
/* ── CONFIGURACIÓN ── */
const SUSTANCIAS = {
    marihuana:  { label: 'Marihuana',  unit: 'caladas',  color: '#f472b6' },
    cocaina:    { label: 'Cocaína',    unit: 'dosis',    color: '#a855f7' },
    cigarrillo: { label: 'Cigarrillo', unit: 'unidades', color: '#c084fc' },
};

/* ── ESTADO ── */
const STORAGE_KEY = 'psy_tracker_logs_v2';
let logs = [];
let chart;

/* ── UTILIDADES ── */
function today() { return new Date().toISOString().split('T')[0]; }

function getPast7Days() {
    const days = [];
    for (let i = 6; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        days.push(d.toISOString().split('T')[0]);
    }
    return days;
}

function saveLogs() { localStorage.setItem(STORAGE_KEY, JSON.stringify(logs)); }

function loadLogs() {
    try { logs = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch(e) { logs = []; }
}

/* ── CONTADORES ── */
function updateCounters() {
    const t = today();
    const totals = {};
    Object.keys(SUSTANCIAS).forEach(s => totals[s] = 0);
    logs.forEach(log => {
        if (log.date === t && totals[log.substance] !== undefined)
            totals[log.substance] += log.qty;
    });
    Object.keys(SUSTANCIAS).forEach(s => {
        const el = document.getElementById('count-' + s);
        if (el) el.textContent = totals[s];
    });
}

/* ── REGISTRAR ── */
function registrar(substance, qty, cardId) {
    logs.push({ timestamp: Date.now(), date: today(), substance, qty });
    saveLogs();
    updateCounters();
    updateChart();

    const card = document.getElementById(cardId);
    if (card) {
        card.classList.remove('pulse');
        void card.offsetWidth;
        card.classList.add('pulse');
        setTimeout(() => card.classList.remove('pulse'), 600);
    }
    showToast(`+${qty} ${SUSTANCIAS[substance]?.unit || ''} registrado`);
}

/* ── TOAST ── */
let toastTimer;
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

/* ── DATOS GRÁFICA ── */
function processData() {
    const dates = getPast7Days();
    const dataMap = {};
    Object.keys(SUSTANCIAS).forEach(s => dataMap[s] = Array(7).fill(0));
    logs.forEach(log => {
        const idx = dates.indexOf(log.date);
        if (idx !== -1 && dataMap[log.substance] !== undefined)
            dataMap[log.substance][idx] += log.qty;
    });
    return { dates, dataMap };
}

/* ── GRÁFICA ── */
function initChart() {
    const ctx = document.getElementById('consumptionChart').getContext('2d');
    const { dates, dataMap } = processData();

    const labels = dates.map(d => {
        const [, m, day] = d.split('-');
        return `${day}/${m}`;
    });

    const datasets = Object.entries(SUSTANCIAS).map(([key, cfg]) => ({
        label: `${cfg.label}`,
        data: dataMap[key],
        borderColor: cfg.color,
        backgroundColor: cfg.color + '22',
        borderWidth: 2.5,
        tension: 0.45,
        pointRadius: 5,
        pointHoverRadius: 8,
        pointBackgroundColor: cfg.color,
        pointBorderColor: '#ffffff',
        pointBorderWidth: 2.5,
        fill: true,
    }));

    chart = new Chart(ctx, {
        type: 'line',
        data: { labels, datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            animation: { duration: 900, easing: 'easeOutQuart' },
            plugins: {
                legend: {
                    labels: {
                        color: '#9d8bb0',
                        font: { family: "'Nunito', sans-serif", size: 11, weight: '700' },
                        boxWidth: 10,
                        boxHeight: 10,
                        borderRadius: 5,
                        useBorderRadius: true,
                        padding: 20,
                    }
                },
                tooltip: {
                    backgroundColor: '#ffffff',
                    borderColor: '#ede9f6',
                    borderWidth: 1.5,
                    titleColor: '#3b1f5e',
                    bodyColor: '#9d8bb0',
                    titleFont: { family: "'Nunito', sans-serif", size: 13, weight: '800' },
                    bodyFont: { family: "'Nunito', sans-serif", size: 11 },
                    padding: 14,
                    cornerRadius: 14,
                    boxShadow: '0 4px 20px rgba(180,130,220,0.15)',
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    grid: { color: '#f3eeff' },
                    ticks: {
                        color: '#c4aee0',
                        font: { family: "'Nunito', sans-serif", size: 10, weight: '700' },
                        stepSize: 1,
                    },
                    border: { color: '#ede9f6' }
                },
                x: {
                    grid: { display: false },
                    ticks: {
                        color: '#c4aee0',
                        font: { family: "'Nunito', sans-serif", size: 10, weight: '700' },
                    },
                    border: { color: '#ede9f6' }
                }
            }
        }
    });
}

function updateChart() {
    const { dataMap } = processData();
    Object.keys(SUSTANCIAS).forEach((key, i) => {
        chart.data.datasets[i].data = dataMap[key];
    });
    chart.update();
}

/* ── RESET ── */
function resetearDatos() {
    if (confirm('¿Borrar todo el historial? Esta acción no se puede deshacer.')) {
        logs = [];
        saveLogs();
        updateCounters();
        updateChart();
        showToast('Historial eliminado');
    }
}

/* ── EXPORTAR ── */
function exportarDatos() {
    const blob = new Blob([JSON.stringify(logs, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `registro_consumo_${today()}.json`;
    a.click();
    URL.revokeObjectURL(url);
}

/* ── DATE STRIP ── */
function updateDateStrip() {
    const now = new Date();
    const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('dateStrip').textContent =
        now.toLocaleDateString('es-CO', opts).toUpperCase();
}

/* ── INIT ── */
window.onload = () => {
    loadLogs();
    updateDateStrip();
    updateCounters();
    initChart();
};
</script>
</body>
</html>
